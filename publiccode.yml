description:
  en:
    localisedName: ckanext-geocat
    shortDescription: CKAN extension implementing harvesting from geocat.ch for opendata.swiss
    longDescription: ckanext-geocat harvests data from the Swiss CSW service geocat.ch to the Swiss open data portal opendata.swiss. The source format is ISO-19139_che (Swiss version of ISO-19139) and the target format is DCAT-AP Switzerland.
    features:
      - implementing harvesting from geocat.ch
